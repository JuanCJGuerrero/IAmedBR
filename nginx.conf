server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ----- Tamanho máximo de upload -----
    client_max_body_size 25m;

    # ----- Performance -----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript image/svg+xml;

    # ----- Esconder versão do Nginx -----
    server_tokens off;

    # ----- Security headers -----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self)" always;

    # CSP em linha única (quebra de linha no nginx pode truncar o header).
    # Inclui Google Fonts, estilos inline do Tailwind/shadcn, vídeo do CloudFront
    # e os 4 microserviços locais.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' http://localhost:8000 http://localhost:8100 http://localhost:8200 http://localhost:8300 https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # Cache imutável para assets versionados pelo Vite
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' http://localhost:8000 http://localhost:8100 http://localhost:8200 http://localhost:8300 https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "OK";
    }

    # Bloquear acesso a arquivos sensíveis
    location ~ /\.(env|git|svn|hg) { deny all; return 404; }
}
